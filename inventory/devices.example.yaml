# Copy to inventory/devices.yaml and edit. Passwords are not stored here, they
# come from the environment (see .env.example).
devices:
  - name: core-sw-01
    host: 10.0.0.11
    platform: cisco_ios
    groups: [core, campus]

  - name: dc-spine-01
    host: 10.0.1.11
    platform: cisco_nxos
    groups: [datacenter, spine]

  - name: dc-leaf-01
    host: 10.0.1.21
    platform: cisco_nxos
    groups: [datacenter, leaf]

  - name: edge-rtr-01
    host: 10.0.2.1
    platform: cisco_ios
    username: netadmin  # optional per-device override of the default user
    groups: [edge, wan]
